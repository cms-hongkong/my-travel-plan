<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的旅行行程表</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container { 
            width: 100%;
            max-width: 600px; 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        h2 { 
            text-align: center; 
            color: #1C1C1E;
            margin-top: 0;
            font-weight: 600;
        }
        .info-tag {
            text-align: center;
            font-size: 12px;
            color: #8E8E93;
            margin-bottom: 20px;
        }
        textarea { 
            width: 100%; 
            height: 450px; 
            padding: 15px; 
            border: 1px solid #D1D1D6; 
            border-radius: 12px; 
            font-size: 16px; 
            line-height: 1.5;
            box-sizing: border-box; 
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus {
            border-color: var(--primary-color);
        }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 16px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 600;
            cursor: pointer; 
            margin-top: 15px; 
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { 
            background-color: #0056b3; 
            transform: scale(0.98);
        }
        #status { 
            text-align: center; 
            font-size: 14px; 
            margin-top: 12px; 
            height: 20px;
            color: #34C759; 
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">載入中...</div>

<div class="container">
    <h2>✈️ 旅行行程筆記</h2>
    <div class="info-tag">內容將自動在所有裝置間同步</div>
    
    <textarea id="plannerInput" placeholder="在此開始規劃你的行程...&#10;例如：&#10;10:00 抵達機場&#10;12:00 午餐：道地拉麵"></textarea>
    
    <button class="btn" onclick="saveData()">💾 儲存並更新雲端</button>
    <p id="status"></p>
</div>

<script type="module">
    // 引入 Firebase SDK
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    // 使用你提供的 Config
    const firebaseConfig = {
        apiKey: "AIzaSyBcaK3Bzs4IRIlnV3V3JEdlzpDBdCXhWKg",
        authDomain: "travel-planner-6f08d.firebaseapp.com",
        databaseURL: "https://travel-planner-6f08d-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "travel-planner-6f08d",
        storageBucket: "travel-planner-6f08d.firebasestorage.app",
        messagingSenderId: "545387212656",
        appId: "1:545387212656:web:8f67189deb55935e9529b5"
    };

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const planRef = ref(db, 'shared_travel_plan');

    const inputArea = document.getElementById('plannerInput');
    const statusText = document.getElementById('status');
    const loader = document.getElementById('loader');

    // 1. 自動讀取：當開啟網頁或雲端有變動時，更新畫面
    onValue(planRef, (snapshot) => {
        const data = snapshot.val();
        if (data !== null) {
            inputArea.value = data;
        }
        loader.style.display = 'none'; // 隱藏載入畫面
    });

    // 2. 儲存功能
    window.saveData = () => {
        const content = inputArea.value;
        statusText.style.color = "#8E8E93";
        statusText.innerText = "正在儲存到雲端...";

        set(planRef, content)
            .then(() => {
                statusText.style.color = "#34C759";
                statusText.innerText = "✅ 已成功儲存！所有裝置同步中。";
                setTimeout(() => { statusText.innerText = ""; }, 3000);
            })
            .catch((error) => {
                statusText.style.color = "#FF3B30";
                statusText.innerText = "❌ 儲存失敗：" + error.message;
            });
    };
</script>

</body>
</html>
