<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Travel Planner Debug</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vuedraggable/4.1.0/vuedraggable.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; }
        [v-cloak] { display: none; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        .header { background: var(--card); padding: 20px; text-align: center; box-shadow: 0 1px 10px rgba(0,0,0,0.05); }
        .btn-add { background: var(--primary); color: white; padding: 15px; border-radius: 15px; border: none; width: 80%; font-weight: bold; cursor: pointer; position: fixed; bottom: 30px; left: 10%; box-shadow: 0 5px 15px rgba(0,122,255,0.3); }
        .loading-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 999; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div v-if="loading" class="loading-screen">
        <div>
            <i class="fa-solid fa-earth-asia fa-spin" style="font-size: 40px; color: var(--primary);"></i>
            <p>正在同步雲端資料...</p>
        </div>
    </div>

    <div class="header">
        <h2>🧭 My Trip Planner</h2>
        <div style="font-size: 12px; color: #888;">如果畫面空白，請檢查 Firebase Rules</div>
    </div>

    <div style="padding: 20px;">
        <div v-for="(day, dIdx) in days" :key="dIdx" style="margin-bottom: 20px; background: white; border-radius: 15px; padding: 15px;">
            <h3 style="margin-top:0;">Day {{ dIdx + 1 }} - {{ day.city || '未設定城市' }}</h3>
            <div v-for="(ev, eIdx) in day.events" :key="eIdx" style="padding: 10px; border-bottom: 1px solid #EEE;">
                <b>{{ ev.time }}</b> - {{ ev.title }}
            </div>
            <button @click="openAdd(dIdx)" style="margin-top:10px; border: 1px dashed #CCC; background: none; width: 100%; padding: 10px; border-radius: 10px;">+ 新增行程</button>
        </div>
    </div>

    <button class="btn-add" @click="addDay">＋ 增加天數</button>

    <div v-if="showModal" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:1000;">
        <div style="background:white; padding:20px; border-radius:20px; width:80%;">
            <h3>新增行程</h3>
            <input v-model="form.title" placeholder="地點名稱" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
            <input type="time" v-model="form.time" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
            <button @click="saveEvent" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:10px;">儲存</button>
            <button @click="showModal=false" style="width:100%; padding:10px; background:none; border:none; color:#888;">取消</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    // ⚠️ 確保呢度嘅內容係你喺 Firebase Console 複製出嚟嗰段
    const firebaseConfig = {
        apiKey: "AIzaSyBcaK3Bzs4IRIlnV3V3JEdlzpDBdCXhWKg",
        authDomain: "travel-planner-6f08d.firebaseapp.com",
        databaseURL: "https://travel-planner-6f08d-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "travel-planner-6f08d",
        storageBucket: "travel-planner-6f08d.firebasestorage.app",
        messagingSenderId: "545387212656",
        appId: "1:545387212656:web:8f67189deb55935e9529b5"
    };

    try {
        const fbApp = initializeApp(firebaseConfig);
        const db = getDatabase(fbApp);
        const planRef = ref(db, 'planner_v9');

        const { createApp, ref: vRef, onMounted } = Vue;

        createApp({
            setup() {
                const loading = vRef(true);
                const days = vRef([{ events: [], city: '' }]);
                const showModal = vRef(false);
                const currentDay = vRef(0);
                const form = vRef({ title: '', time: '09:00' });

                onMounted(() => {
                    onValue(planRef, (snap) => {
                        const data = snap.val();
                        if (data) {
                            days.value = data;
                        } else {
                            // 如果雲端冇資料，初始化一個空的 Day 1
                            set(planRef, [{ events: [], city: '' }]);
                        }
                        loading.value = false;
                    }, (err) => {
                        alert("Firebase 讀取失敗，請檢查 Rules 是否設為 true！");
                        console.error(err);
                    });
                });

                const save = () => set(planRef, JSON.parse(JSON.stringify(days.value)));
                const addDay = () => { days.value.push({ events: [], city: '' }); save(); };
                const openAdd = (idx) => { currentDay.value = idx; showModal.value = true; };
                const saveEvent = () => {
                    days.value[currentDay.value].events.push({...form.value});
                    showModal.value = false;
                    save();
                };

                return { loading, days, showModal, form, addDay, openAdd, saveEvent };
            }
        }).mount('#app');
    } catch (e) {
        alert("程式初始化失敗：" + e.message);
    }
</script>
</body>
</html>
